name: app-ci

# Gates every PR into main that touches the app: typecheck, unit tests, and a
# production build must all pass. Mirrors the local verification flow.

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'

jobs:
  app-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install deps
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        working-directory: app
        run: pnpm typecheck

      - name: Unit tests
        working-directory: app
        run: pnpm test

      - name: Build
        working-directory: app
        run: pnpm build
        env:
          NEXT_PUBLIC_SUI_NETWORK: testnet
