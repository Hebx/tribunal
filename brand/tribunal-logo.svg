<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Tribunal logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="1" stop-color="#0D1426"/>
    </linearGradient>
    <linearGradient id="aqua" x1="120" y1="96" x2="392" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7FD0FF"/>
      <stop offset="0.5" stop-color="#4DA2FF"/>
      <stop offset="1" stop-color="#2E7BE0"/>
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="236" r="190" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4DA2FF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#4DA2FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- backdrop -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- hexagonal seal -->
  <polygon points="256,72 405,160 405,352 256,440 107,352 107,160"
           fill="none" stroke="url(#aqua)" stroke-width="6" stroke-opacity="0.5" stroke-linejoin="round"/>
  <polygon points="256,104 378,176 378,336 256,408 134,336 134,176"
           fill="none" stroke="#4DA2FF" stroke-width="2" stroke-opacity="0.22" stroke-linejoin="round"/>

  <!-- committee: three converging lines feeding the beam (consensus into judgment) -->
  <g stroke="#4DA2FF" stroke-width="3" stroke-opacity="0.45">
    <line x1="150" y1="170" x2="256" y2="150"/>
    <line x1="362" y1="170" x2="256" y2="150"/>
    <line x1="256" y1="118" x2="256" y2="150"/>
  </g>

  <g filter="url(#soft)">
    <!-- apex node -->
    <circle cx="256" cy="128" r="20" fill="#0A0E1A" stroke="url(#aqua)" stroke-width="6"/>
    <circle cx="256" cy="128" r="6" fill="#7FD0FF"/>

    <!-- central column -->
    <rect x="250" y="150" width="12" height="180" rx="6" fill="url(#aqua)"/>
    <!-- beam -->
    <rect x="148" y="156" width="216" height="11" rx="5.5" fill="url(#aqua)"/>

    <!-- hanger cords -->
    <g stroke="url(#aqua)" stroke-width="4" stroke-linecap="round">
      <line x1="156" y1="164" x2="156" y2="206"/>
      <line x1="356" y1="164" x2="356" y2="206"/>
    </g>

    <!-- left dish pan -->
    <path d="M116 206 A40 34 0 0 0 196 206 Z" fill="#0A0E1A" stroke="url(#aqua)" stroke-width="6" stroke-linejoin="round"/>
    <!-- right dish pan -->
    <path d="M316 206 A40 34 0 0 0 396 206 Z" fill="#0A0E1A" stroke="url(#aqua)" stroke-width="6" stroke-linejoin="round"/>

    <!-- base plinth -->
    <rect x="206" y="328" width="100" height="12" rx="6" fill="url(#aqua)"/>
    <rect x="226" y="340" width="60" height="9" rx="4.5" fill="url(#aqua)" fill-opacity="0.6"/>
  </g>

  <!-- verdict node centered on column with tick -->
  <circle cx="256" cy="250" r="26" fill="#0A0E1A" stroke="url(#aqua)" stroke-width="6"/>
  <path d="M244 250 l8 9 l16 -20" fill="none" stroke="#7FD0FF" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
